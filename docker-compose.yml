version: '3.8'

services:
  # n8n workflow engine
  n8n:
    image: n8n:latest-alpine
    container_name: sentinel-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres-n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - WEBHOOK_TUNNEL_URL=http://localhost:5678/
      - NODES_EXCLUDE=[]
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n-node/dist:/home/node/.n8n/nodes/n8n-nodes-sentinel-triage
    depends_on:
      - postgres-n8n
    networks:
      - sentinel-network
    restart: unless-stopped

  # PostgreSQL for n8n
  postgres-n8n:
    image: postgres:16-alpine
    container_name: sentinel-postgres-n8n
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8n}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    volumes:
      - postgres-n8n-data:/var/lib/postgresql/data
    networks:
      - sentinel-network
    restart: unless-stopped

  # Sentinel backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./sentinel.db}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.75}
      - ANTHROPIC_MODEL=claude-sonnet-4-6
    volumes:
      - ./backend:/app
      - sentinel-db:/app
    networks:
      - sentinel-network
    restart: unless-stopped
    depends_on:
      - n8n

  # Dashboard (simple HTTP server)
  dashboard:
    image: nginx:alpine
    container_name: sentinel-dashboard
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    networks:
      - sentinel-network
    restart: unless-stopped

volumes:
  n8n-data:
  postgres-n8n-data:
  sentinel-db:

networks:
  sentinel-network:
    driver: bridge
